[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoeit-sts"
version = "0.2.0"
description = "Automated scoring for the Spanish Elicited Imitation Task"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0,<3.0",
    "openpyxl>=3.1,<4.0",
]

[project.optional-dependencies]
ui = ["streamlit>=1.30"]
dev = ["pytest>=7.0", "pytest-cov"]

[tool.setuptools.packages.find]
include = ["autoeit*"]

[project.scripts]
autoeit = "autoeit.api.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E741"]  # ambiguous variable name — 'l' used intentionally in rubric
